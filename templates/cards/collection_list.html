{% extends 'base.html' %}

{% block content %}
<h1>My collections</h1>

<a href="{% url 'cards:collection_create' %}">
    Создать коллекцию
</a>

<hr>

{% for collection in collections %}
    <div>
        <h3>
            <a href="{% url 'cards:collection_detail' collection.id %}">
                {{ collection.title }}
            </a>
        </h3>

        <p>
            Карточек: {{ collection.cards.count }}
        </p>
    </div>

    <hr>
{% empty %}
    <p>Пока нет коллекций</p>
{% endfor %}
{% endblock %}
